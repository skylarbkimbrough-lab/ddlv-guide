<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>FE3H Grand Campaign Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1008;
    --surface: #221508;
    --surface2: #2d1d0d;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --cream: #f5ead8;
    --cream-dim: #c8b89a;
    --tea: #8b5e3c;
    --green: #8ec07c;
    --border: rgba(201,168,76,0.2);
    --border-bright: rgba(201,168,76,0.5);
    --input-bg: #150d06;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(139,94,60,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(122,59,46,0.08) 0%, transparent 50%);
    background-attachment: fixed;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: calc(70px + var(--safe-bottom)); /* Leave room for sticky mobile nav bar */
  }

  header {
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(to bottom, #1a1008, var(--surface));
  }

  .header-ornament {
    color: var(--gold);
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    opacity: 0.7;
    margin-bottom: 0.25rem;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    font-weight: 700;
    letter-spacing: 0.03em;
    line-height: 1.2;
  }

  /* Sticky Controls for Lookup Screens */
  .sticky-controls {
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(26, 16, 8, 0.96);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .search-wrap {
    position: relative;
    max-width: 600px;
    margin: 0 auto;
  }
  .search-wrap.with-margin { margin-bottom: 0.75rem; }

  .search-wrap::before {
    content: '⚜';
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 0.9rem;
    pointer-events: none;
  }

  input[type="text"], select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 0.75rem 0.75rem 0.75rem 2.4rem;
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    outline: none;
    height: 44px; /* Standard mobile touch-target */
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  select { padding-left: 0.85rem; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%23c9a84c'><polygon points='0,2 10,2 5,8'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; }
  input[type="text"]:focus, select:focus { border-color: var(--gold-light); }

  .filter-scroll {
    max-width: 600px;
    margin: 0 auto;
    overflow-x: auto;
    display: flex;
    gap: 0.4rem;
    padding-bottom: 0.25rem;
    -webkit-overflow-scrolling: touch;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .house-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0 0.85rem;
    height: 34px;
    color: var(--cream-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .house-btn.active {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .count-bar {
    max-width: 600px;
    margin: 0.5rem auto 0;
    font-size: 0.8rem;
    color: var(--cream-dim);
    opacity: 0.6;
    text-align: right;
    font-style: italic;
  }

  /* Main View Layout Container */
  .view-panel { display: none; max-width: 600px; margin: 1rem auto 0; padding: 0 1rem; }
  .view-panel.active { display: block; }

  /* --- MODULE 1: TEAM TRACKER STYLES --- */
  .add-member-form {
    background: var(--surface2);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1.25rem;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem; }
  .form-row.full { grid-template-columns: 1fr; }
  .primary-btn {
    width: 100%; background: var(--gold); color: var(--bg); border: none; border-radius: 6px;
    font-family: 'Cinzel', serif; font-weight: bold; height: 44px; font-size: 0.9rem; cursor: pointer;
  }
  .primary-btn:active { background: var(--gold-light); }

  .team-grid { display: flex; flex-direction: column; gap: 0.75rem; }
  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; position: relative; }
  .team-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px dashed rgba(201,168,76,0.15); padding-bottom: 0.4rem;}
  .team-name { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-light); }
  .delete-btn { background: none; border: none; color: #e74c3c; font-size: 1.2rem; cursor: pointer; padding: 0 0.25rem; }
  .track-field { margin-bottom: 0.4rem; font-size: 0.9rem; display: flex; flex-direction: column; gap: 0.15rem; }
  .track-label { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.05em; text-transform: uppercase; }
  .track-val { color: var(--cream); font-style: italic; }

  /* --- MODULE 2 & 3: LOOKUP & LIST STYLES --- */
  .list-container { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 2rem;}
  .char-card, .directory-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .card-header-tap { padding: 0.85rem 1rem; display: flex; align-items: center; gap: 0.65rem; background: var(--surface2); user-select: none; cursor: pointer; }
  .house-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .char-name, .directory-title { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold-light); flex: 1; }
  .house-label, .directory-meta { font-size: 0.75rem; color: var(--cream-dim); opacity: 0.65; font-style: italic; }
  .chevron { color: var(--gold); font-size: 0.75rem; transition: transform 0.2s; opacity: 0.7; }
  .char-card.expanded .chevron, .directory-card.expanded .chevron { transform: rotate(180deg); }
  .card-content { display: none; padding: 1rem; border-top: 1px solid rgba(201,168,76,0.1); }
  .char-card.expanded .card-content, .directory-card.expanded .card-content { display: block; }
  .section-label { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.08em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.4rem; }
  
  .tea-list, .gift-list { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1rem; }
  .tea-tag, .gift-tag { background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3); border-radius: 4px; padding: 0.25rem 0.6rem; font-size: 0.85rem; color: var(--gold-light); }
  .topics-box { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.02); border-radius: 6px; padding: 0.6rem 0.75rem; margin-bottom: 1rem; font-size: 0.9rem; color: var(--cream-dim); display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.25rem 0.5rem; }
  .topic-item { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .final-convo-section { background: rgba(139,94,60,0.1); border: 1px solid rgba(139,94,60,0.25); border-radius: 6px; padding: 0.75rem; }
  .convo-block { margin-bottom: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px dashed rgba(201,168,76,0.15); }
  .convo-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .convo-line { font-style: italic; font-size: 0.9rem; margin-bottom: 0.35rem; line-height: 1.4; }
  .convo-answer { font-size: 0.85rem; color: var(--green); font-weight: 600; font-family: 'Cinzel', serif; }
  .no-results { text-align: center; padding: 3rem 1rem; color: var(--cream-dim); font-style: italic; opacity: 0.6; }

  /* House Dot Colors */
  .dot-black-eagles { background: #e74c3c; box-shadow: 0 0 6px rgba(231,76,60,0.4); }
  .dot-blue-lions { background: #3498db; box-shadow: 0 0 6px rgba(52,152,219,0.4); }
  .dot-golden-deer { background: #f1c40f; box-shadow: 0 0 6px rgba(241,196,15,0.4); }
  .dot-ashen-wolves { background: #9b59b6; box-shadow: 0 0 6px rgba(155,89,182,0.4); }
  .dot-church { background: #2ecc71; box-shadow: 0 0 6px rgba(46,204,113,0.4); }
  .dot-knights { background: #1abc9c; box-shadow: 0 0 6px rgba(26,188,156,0.4); }
  .dot-other { background: #95a5a6; box-shadow: 0 0 6px rgba(149,165,166,0.4); }

  /* Persistent Mobile Sticky Tab Bar */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(60px + var(--safe-bottom));
    background: #150d06;
    border-top: 1px solid var(--gold);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    z-index: 1000;
    padding-bottom: var(--safe-bottom);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
  }
  .nav-item {
    background: none; border: none; color: var(--cream-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 0.65rem; gap: 0.2rem; cursor: pointer;
    transition: color 0.15s, background-color 0.15s;
  }
  .nav-item span.icon { font-size: 1.1rem; }
  .nav-item.active {
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
    font-weight: bold;
  }
</style>
</head>
<body>

<header>
  <div class="header-ornament">✦ GARREG MACH MONASTERY ✦</div>
  <h1 id="mainTitle">Team Status & Training</h1>
</header>

<div id="viewTeam" class="view-panel active">

    <div class="form-row">
      <input type="text" id="addName" placeholder="Unit Name" style="padding-left: 0.75rem;">
      <select id="addClass">
        <option value="">Current Class</option>

        <option value="Mercenary">Mercenary</option>
        <option value="Thief">Thief</option>
        <option value="Armored Knight">Armored Knight</option>
        <option value="Cavalier">Cavalier</option>
        <option value="Brigand">Brigand</option>
        <option value="Archer">Archer</option>
        <option value="Brawler">Brawler</option>
        <option value="Mage">Mage</option>
        <option value="Priest">Priest</option>
        <option value="Hero">Hero</option>
        <option value="Swordmaster">Swordmaster</option>
        <option value="Assassin">Assassin</option>
        <option value="Fortress Knight">Fortress Knight</option>
        <option value="Paladin">Paladin</option>

        <option value="Great Knight">Great Knight</option>
        <option value="Bow Knight">Bow Knight</option>

        <option value="Holy Knight">Holy Knight</option>

        <option value="Gremory">Gremory</option>
        <option value="Trickster">Trickster</option>
        <option value="War Cleric">War Cleric</option>
        <option value="Dark Flier">Dark Flier</option>
        <option value="Valkyrie">Valkyrie</option>
      </select>
    </div>
    <div class="form-row">
      <input type="text" id="addTraining" placeholder="Goals (e.g. Sword / Faith)" style="padding-left: 0.75rem;">
      <input type="text" id="addGoalClass" placeholder="Target Class" style="padding-left: 0.75rem;">
    </div>
    <button class="primary-btn" onclick="addTeamMember()">Add Unit to Roster</button>
  </div>
  <div class="team-grid" id="teamGrid"></div>
</div>

<div id="viewTea" class="view-panel">
  <div class="sticky-controls" style="top: 0;">
    <div class="search-wrap with-margin">
      <input type="text" id="teaSearch" placeholder="Search tea guest or topic…" autocomplete="off">
    </div>
    <div class="filter-scroll" id="teaFilters"></div>
    <div class="count-bar" id="teaCount"></div>
  </div>
  <div class="list-container" id="teaGridContainer" style="margin-top: 1rem;"></div>
</div>

<div id="viewLost" class="view-panel">
  <div class="sticky-controls" style="top: 0;">
    <div class="search-wrap">
      <input type="text" id="lostSearch" placeholder="Search item description or owner…" autocomplete="off">
    </div>
    <div class="count-bar" id="lostCount"></div>
  </div>
  <div class="list-container" id="lostGridContainer" style="margin-top: 1rem;"></div>
</div>

<div id="viewGifts" class="view-panel">
  <div class="sticky-controls" style="top: 0;">
    <div class="search-wrap">
      <input type="text" id="giftsSearch" placeholder="Search character or gift name…" autocomplete="off">
    </div>
    <div class="count-bar" id="giftsCount"></div>
  </div>
  <div class="list-container" id="giftsGridContainer" style="margin-top: 1rem;"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('team', this)">
    <span class="icon">🛡️</span><span>Team</span>
  </button>
  <button class="nav-item" onclick="switchTab('tea', this)">
    <span class="icon">☕</span><span>Tea Time</span>
  </button>
  <button class="nav-item" onclick="switchTab('lost', this)">
    <span class="icon">🔍</span><span>Lost Items</span>
  </button>
  <button class="nav-item" onclick="switchTab('gifts', this)">
    <span class="icon">🎁</span><span>Gifts</span>
  </button>
</nav>

<script>
// --- STATE MANAGEMENT ---
let team = JSON.parse(localStorage.getItem('fe3h_team_roster')) || [
  { name: "Byleth", currentClass: "Commoner/Noble", training: "Sword / Authority", targetClass: "Enlightened One" },

];

  { id: 'Other', label: '👤 Other' }
];

  { name: "Edelgard", house: "Black Eagles", teas: ["Bergamot", "Hresvelg Blend"], topics: ["Capable comrades…","Evaluating allies…","Fodlan's future…","I'm counting on you…","Our first meeting…"], convos: [{ line: '"If I hadn\'t been born to House Hresvelg, life would be simpler."', answer: 'Praise / Laugh' }, { line: '"It upsets Hubert when I spend time alone with you."', answer: 'Nod / Laugh' }] },

// --- NAVIGATION SYSTEM ---
function switchTab(viewId, btn) {
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const title = document.getElementById('mainTitle');
  if (viewId === 'team') {
    document.getElementById('viewTeam').classList.add('active');
    title.textContent = "Team Status & Goals";
  } else if (viewId === 'tea') {
    document.getElementById('viewTea').classList.add('active');
    title.textContent = "Tea Time Lookup";
    renderTea();
  } else if (viewId === 'lost') {
    document.getElementById('viewLost').classList.add('active');
    title.textContent = "Lost Items Directory";
    renderLost();
  } else if (viewId === 'gifts') {
    document.getElementById('viewGifts').classList.add('active');
    title.textContent = "Gifts Reference";
    renderGifts();
  }
  window.scrollTo({ top: 0 });
}

// --- MODULE 1: ROSTER TRACKER LOGIC ---
function renderTeam() {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  if (team.length === 0) {
    grid.innerHTML = '<div class="no-results">Roster is empty. Add your strike force team configurations above!</div>';
    return;
  }
  team.forEach((member, index) => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `
      <div class="team-card-header">
        <div class="team-name">${member.name}</div>
        <button class="delete-btn" onclick="deleteTeamMember(${index})">×</button>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
        <div class="track-field"><span class="track-label">Current Class</span><span class="track-val">${member.currentClass || 'None'}</span></div>
        <div class="track-field"><span class="track-label">Target Class</span><span class="track-val">${member.targetClass || 'None'}</span></div>
      </div>
      <div class="track-field" style="margin-top: 0.25rem;"><span class="track-label">Training Focus</span><span class="track-val">${member.training || 'None'}</span></div>
    `;
    grid.appendChild(card);
  });
}

function addTeamMember() {
  const nameInput = document.getElementById('addName');
  const classInput = document.getElementById('addClass');
  const trainInput = document.getElementById('addTraining');
  const goalInput = document.getElementById('addGoalClass');

  if (!nameInput.value.trim()) return alert("Unit Name is required!");

  team.push({
    name: nameInput.value.trim(),
    currentClass: classInput.value,
    training: trainInput.value.trim(),
    targetClass: goalInput.value.trim()
  });

  localStorage.setItem('fe3h_team_roster', JSON.stringify(team));
  renderTeam();

  // Reset fields
  nameInput.value = ''; classInput.value = ''; trainInput.value = ''; goalInput.value = '';
}

function deleteTeamMember(index) {
  team.splice(index, 1);
  localStorage.setItem('fe3h_team_roster', JSON.stringify(team));
  renderTeam();
}

// --- MODULE 2: TEA TIME LOOKUP LOGIC ---
function renderTeaFilters() {
  const wrap = document.getElementById('teaFilters');
  wrap.innerHTML = '';
  HOUSES.forEach(h => {
    const btn = document.createElement('button');
    btn.className = 'house-btn' + (teaActiveHouse === h.id ? ' active' : '');
    btn.textContent = h.label;
    btn.onclick = () => { teaActiveHouse = h.id; renderTea(); btn.scrollIntoView({ behavior: 'smooth', inline: 'center' }); };
    wrap.appendChild(btn);
  });
}

function renderTea() {
  const q = document.getElementById('teaSearch').value.toLowerCase().trim();
  const filtered = TEA_CHARS.filter(c => {
    const houseMatch = teaActiveHouse === 'all' || c.house === teaActiveHouse;
    const searchMatch = !q || c.name.toLowerCase().includes(q) || c.teas.some(t => t.toLowerCase().includes(q)) || c.topics.some(t => t.toLowerCase().includes(q));
    return houseMatch && searchMatch;
  });

  document.getElementById('teaCount').textContent = `${filtered.length} guests listed`;
  const grid = document.getElementById('teaGridContainer');
  grid.innerHTML = '';

  filtered.forEach(char => {
    const isExpanded = expandedCards['tea_' + char.name] || false;
    const card = document.createElement('div');
    card.className = 'char-card' + (isExpanded ? ' expanded' : '');
    card.innerHTML = `
      <div class="card-header-tap">
        <div class="house-dot ${DOT_CLASS[char.house]}"></div>
        <div class="char-name">${char.name}</div>
        <div class="house-label">${char.house}</div>
        <div class="chevron">▼</div>
      </div>
      <div class="card-content">
        <div class="section-label">Favorite Teas</div>
        <div class="tea-list">${char.teas.map(t => `<span class="tea-tag">${t}</span>`).join('')}</div>
        <div class="section-label">Sample Dialogue Topics</div>
        <div class="topics-box">${char.topics.map(t => `<div class="topic-item">${t}</div>`).join('')}</div>
        <div class="section-label">Final Interrogations</div>
        <div class="final-convo-section">${char.convos.map(co => `<div class="convo-block"><div class="convo-line">${co.line}</div><div class="convo-answer">✓ ${co.answer}</div></div>`).join('')}</div>
      </div>
    `;
    card.querySelector('.card-header-tap').addEventListener('click', () => {
      card.classList.toggle('expanded');
      expandedCards['tea_' + char.name] = card.classList.contains('expanded');
    });
    grid.appendChild(card);
  });
}

// --- MODULE 3: LOST ITEMS LOGIC ---
function renderLost() {
  const q = document.getElementById('lostSearch').value.toLowerCase().trim();
  const filtered = LOST_ITEMS.filter(item => !q || item.item.toLowerCase().includes(q) || item.owner.toLowerCase().includes(q) || item.location.toLowerCase().includes(q));
  
  document.getElementById('lostCount').textContent = `${filtered.length} matching items`;
  const grid = document.getElementById('lostGridContainer');
  grid.innerHTML = '';

  filtered.forEach((item, idx) => {
    const isExpanded = expandedCards['lost_' + idx] || false;
    const card = document.createElement('div');
    card.className = 'directory-card' + (isExpanded ? ' expanded' : '');
    card.innerHTML = `
      <div class="card-header-tap">
        <div class="directory-title" style="font-size:0.95rem;">📦 ${item.item}</div>
        <div class="directory-meta">Owner: ${item.owner}</div>
        <div class="chevron" style="margin-left:0.5rem">▼</div>
      </div>
      <div class="card-content" style="background: rgba(0,0,0,0.15)">
        <div class="track-field"><span class="track-label">Return To</span><span class="track-val" style="color:var(--gold-light); font-weight:bold;">${item.owner}</span></div>
        <div class="track-field" style="margin-top:0.4rem"><span class="track-label">Found Location</span><span class="track-val">${item.location}</span></div>
      </div>
    `;
    card.querySelector('.card-header-tap').addEventListener('click', () => {
      card.classList.toggle('expanded');
      expandedCards['lost_' + idx] = card.classList.contains('expanded');
    });
    grid.appendChild(card);
  });
}

// --- MODULE 4: GIFTS LOGIC ---
function renderGifts() {
  const q = document.getElementById('giftsSearch').value.toLowerCase().trim();
  const filtered = GIFTS_DATA.filter(char => !q || char.name.toLowerCase().includes(q) || char.likes.some(g => g.toLowerCase().includes(q)));

  document.getElementById('giftsCount').textContent = `${filtered.length} characters found`;
  const grid = document.getElementById('giftsGridContainer');
  grid.innerHTML = '';

  filtered.forEach(char => {
    const isExpanded = expandedCards['gift_' + char.name] || false;
    const card = document.createElement('div');
    card.className = 'directory-card' + (isExpanded ? ' expanded' : '');
    card.innerHTML = `
      <div class="card-header-tap">
        <div class="house-dot ${DOT_CLASS[char.house] || 'dot-other'}"></div>
        <div class="directory-title" style="margin-left:0.5rem;">${char.name}</div>
        <div class="directory-meta">${char.house}</div>
        <div class="chevron" style="margin-left:0.5rem">▼</div>
      </div>
      <div class="card-content">
        <div class="section-label">Loved Gifts (+Support Points)</div>
        <div class="gift-list">${char.likes.map(g => `<span class="gift-tag">🎁 ${g}</span>`).join('')}</div>
      </div>
    `;
    card.querySelector('.card-header-tap').addEventListener('click', () => {
      card.classList.toggle('expanded');
      expandedCards['gift_' + char.name] = card.classList.contains('expanded');
    });
    grid.appendChild(card);
  });
}

// --- DEBUNCED EVENT LISTENERS FOR PERFORMANCE ---
let searchTimeout;
const debounceRender = (callback) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => window.requestAnimationFrame(callback), 80);
};

document.getElementById('teaSearch').addEventListener('input', () => debounceRender(renderTea));
document.getElementById('lostSearch').addEventListener('input', () => debounceRender(renderLost));
document.getElementById('giftsSearch').addEventListener('input', () => debounceRender(renderGifts));

// --- INITIALIZATIONS ---
renderTeam();
renderTeaFilters();
</script>
