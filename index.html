<style>
  :root {
    --bg: #1a1008;
    --surface: #221508;
    --surface2: #2d1d0d;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --cream: #f5ead8;
    --cream-dim: #c8b89a;
    --tea: #8b5e3c;
    --accent: #7a3b2e;
    --green: #4a7c59;
    --blue: #2980b9;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(139,94,60,0.15) 0%, transparent 50%),

    padding-bottom: 3rem;
  }

  /* Navigation Bar */
  nav {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  .nav-btn {
    background: transparent;
    border: none;
    color: var(--cream-dim);
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    padding: 0.5rem 1rem;
    transition: all 0.2s;
    position: relative;
  }

  .nav-btn:hover, .nav-btn.active {
    color: var(--gold-light);
  }

  .nav-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 1rem;
    right: 1rem;
    height: 2px;
    background: var(--gold);
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--gold-light);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .app-section {
    display: none;
  }

  .app-section.active {
    display: block;
  }

  /* Controls */
  .controls {
    max-width: 1000px;
    margin: 1rem auto 0;
    padding: 0 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 250px;
    position: relative;
  }

  .search-wrap::before {
    content: '⚜';
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 0.85rem;
    pointer-events: none;
  }

  input[type="text"], select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 0.55rem 0.75rem;
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    outline: none;
  }

  input[type="text"] { padding-left: 2.2rem; }

  .house-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.45rem 0.8rem;
    color: var(--cream-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .house-btn.active, .house-btn:hover {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Grid Layouts */
  .grid-container {
    max-width: 1000px;
    margin: 1.5rem auto;
    padding: 0 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 1.25rem;
  }

  /* Unified Character Cards */
  .char-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
  }

  .char-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }

  .card-header {
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .house-dot { width: 8px; height: 8px; border-radius: 50%; }
  .char-name { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600; color: var(--gold-light); flex: 1; }
  .house-label { font-size: 0.75rem; color: var(--cream-dim); opacity: 0.6; font-style: italic; }

  .card-body { padding: 1rem; }
  .section-label { font-family: 'Cinzel', serif; font-size: 0.68rem; letter-spacing: 0.08em; color: var(--gold); text-transform: uppercase; margin: 0.6rem 0 0.3rem; }
  .section-label:first-child { margin-top: 0; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.5rem; }
  .item-tag { background: rgba(139,94,60,0.15); border: 1px solid rgba(139,94,60,0.4); border-radius: 2px; padding: 0.15rem 0.45rem; font-size: 0.85rem; color: #d4a96a; }
  .item-tag.tea { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.3); color: var(--gold-light); }
  .item-tag.gift { background: rgba(74,124,89,0.1); border-color: rgba(74,124,89,0.3); color: #8bc39a; }
  .item-tag.lost { background: rgba(122,59,46,0.1); border-color: rgba(122,59,46,0.3); color: #f29c9c; }

  .topics-list { display: flex; flex-wrap: wrap; gap: 0.3rem; font-size: 0.82rem; color: var(--cream-dim); line-height: 1.4; margin-bottom: 0.6rem; }
  .topic-tag { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; padding: 0.1rem 0.4rem; }

  .expand-pane { display: none; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px dashed var(--border); }
  .char-card.expanded .expand-pane { display: block; }

  .convo-block { background: rgba(0,0,0,0.15); padding: 0.5rem; border-radius: 4px; margin-bottom: 0.4rem; border-left: 2px solid var(--accent); }
  .convo-line { font-style: italic; font-size: 0.85rem; margin-bottom: 0.2rem; }
  .convo-answer { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--green); font-weight: 600; }

  .expand-hint { text-align: center; font-size: 0.75rem; color: var(--gold); opacity: 0.5; font-style: italic; margin-top: 0.5rem; }

  /* Roster Planner Elements */
  .roster-slot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .slot-title { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
  
  .row-field { display: flex; flex-direction: column; gap: 0.25rem; }
  .row-field label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--cream-dim); }

  .toggle-group { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
  .toggle-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); padding: 0.35rem; font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--cream-dim); cursor: pointer; border-radius: 3px; }
  .toggle-btn.active { background: var(--green); border-color: #629e73; color: white; }
  .toggle-btn.bench.active { background: var(--accent); border-color: #9e4636; }

  .dot-blue-lions { background: #2980b9; }
  .dot-golden-deer { background: #f39c12; }
  .dot-ashen-wolves { background: #8e44ad; }
  .dot-church { background: #27ae60; }
  .dot-knights { background: #16a085; }
  .dot-other { background: #7f8c8d; }

  .no-results { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--cream-dim); font-style: italic; opacity: 0.6; }
</style>
</head>

const HOUSES = ['All', 'Black Eagles', 'Blue Lions', 'Golden Deer', 'Ashen Wolves', 'Church'];
const CLASSES = ['None', 'Noble/Commoner', 'Myrmidon/Soldier/Fighter/Monk', 'Mercenary/Thief/Cavalier/Mage', 'Swordmaster/Paladin/Assassin/Warlock', 'Falcon Knight/Wyvern Lord/Mortal Savant/Gremory'];
const WEAPONS = ['Sword', 'Lance', 'Axe', 'Bow', 'Brawling', 'Reason (Black/Dark)', 'Faith (White)', 'Authority'];

let currentTab = 'lookup';
let activeHouse = 'All';
let searchStr = '';

function switchTab(tabId) {
  currentTab = tabId;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
  
  if(tabId === 'lookup') {
    document.querySelector("button[onclick=\"switchTab('lookup')\"]").classList.add('active');
    document.getElementById('lookupTab').classList.add('active');
  } else {
    document.querySelector("button[onclick=\"switchTab('roster')\"]").classList.add('active');
    document.getElementById('rosterTab').classList.add('active');
  }
}

function renderFilters() {
  const container = document.getElementById('houseFilters');
  container.innerHTML = '';
  HOUSES.forEach(h => {
    const btn = document.createElement('button');
    btn.className = `house-btn ${activeHouse === h ? 'active' : ''}`;
    btn.textContent = h;
    btn.onclick = () => { activeHouse = h; renderLookup(); };
    container.appendChild(btn);
  });
}

function renderLookup() {
  const grid = document.getElementById('lookupGrid');
  grid.innerHTML = '';
  const q = searchStr.toLowerCase();

  const filtered = CHARS.filter(c => {
    const houseMatch = activeHouse === 'All' || c.house === activeHouse;
    const txtMatch = !q || 
      c.name.toLowerCase().includes(q) ||
      c.teas.some(t => t.toLowerCase().includes(q)) ||
      c.gifts.some(g => g.toLowerCase().includes(q)) ||
      c.topics.some(tp => tp.toLowerCase().includes(q)) ||
      c.lost.some(l => l.toLowerCase().includes(q));
    return houseMatch && txtMatch;
  });

  if(filtered.length === 0) {
    grid.innerHTML = `<div class="no-results">No units found matching criteria.</div>`;
    return;
  }

  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = 'char-card';
    
    let houseDotClass = 'dot-other';
    if(c.house === 'Black Eagles') houseDotClass = 'dot-black-eagles';
    if(c.house === 'Blue Lions') houseDotClass = 'dot-blue-lions';
    if(c.house === 'Golden Deer') houseDotClass = 'dot-golden-deer';
    if(c.house === 'Ashen Wolves') houseDotClass = 'dot-ashen-wolves';
    if(c.house === 'Church') houseDotClass = 'dot-church';

    const teasHtml = c.teas.map(t => `<span class="item-tag tea">${t}</span>`).join('');
    const giftsHtml = c.gifts.map(g => `<span class="item-tag gift">${g}</span>`).join('');
    const lostHtml = c.lost.length ? c.lost.map(l => `<span class="item-tag lost">${l}</span>`).join('') : '<span class="item-tag" style="opacity:0.5">None</span>';
    const topicsHtml = c.topics.map(tp => `<span class="topic-tag">${tp}</span>`).join('');
    
    const convosHtml = c.convos.map(co => `
      <div class="convo-block">
        <div class="convo-line">"${co.line}"</div>
        <div class="convo-answer">✓ Response: ${co.answer}</div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="house-dot ${houseDotClass}"></div>
        <div class="char-name">${c.name}</div>
        <div class="house-label">${c.house}</div>
      </div>
      <div class="card-body">
        <div class="section-label">Favorite Teas</div>
        <div class="tag-list">${teasHtml}</div>
        
        <div class="section-label">Gifts (+2 Support)</div>
        <div class="tag-list">${giftsHtml}</div>

        <div class="section-label">Lost Items</div>
        <div class="tag-list">${lostHtml}</div>
        
        <div class="expand-hint">Click card to toggle Tea Topics & Final Conversations</div>

        <div class="expand-pane">
          <div class="section-label" style="color: var(--gold-light);">Possible Tea Topics</div>
          <div class="topics-list">${topicsHtml}</div>

          <div class="section-label" style="color: var(--gold-light); margin-top:0.75rem;">Final Tea Conversations</div>
          ${convosHtml}
        </div>
      </div>
    `;

    card.onclick = () => card.classList.toggle('expanded');
    grid.appendChild(card);
  });
}

function buildRosterPlanner() {
  const grid = document.getElementById('rosterGrid');
  grid.innerHTML = '';
  
  for (let i = 1; i <= 12; i++) {
    const slot = document.createElement('div');
    slot.className = 'roster-slot';
    
    const sortedChars = [...CHARS].sort((a,b) => a.name.localeCompare(b.name));
    const charOptions = sortedChars.map(c => `<option value="${c.name}">${c.name} (${c.house})</option>`).join('');
    const classOptions = CLASSES.map(cl => `<option value="${cl}">${cl}</option>`).join('');
    const weaponOptions = WEAPONS.map(w => `<option value="${w}">${w}</option>`).join('');

    slot.innerHTML = `
      <div class="slot-title">Deployment Slot #0${i}</div>
      
      <div class="row-field">
        <label>Assigned Unit</label>
        <select class="roster-char-select">
          <option value="">-- Unassigned --</option>
          ${charOptions}
        </select>
      </div>

      <div class="row-field">
        <label>Target Cert Class</label>
        <select>
          ${classOptions}
        </select>
      </div>

      <div class="row-field">
        <label>Primary Focus</label>
        <select>
          ${weaponOptions}
        </select>
      </div>

      <div class="row-field">
        <label>Status Allocation</label>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="setSlotStatus(this, 'active')">Deployed</button>
          <button class="toggle-btn bench" onclick="setSlotStatus(this, 'bench')">Benched</button>
        </div>
      </div>
    `;
    grid.appendChild(slot);
  }
}

function setSlotStatus(btn, status) {
  const group = btn.parentElement;
  group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchStr = e.target.value;
  renderLookup();
});

// App Startup Initializers
renderFilters();
renderLookup();
buildRosterPlanner();
</script>
