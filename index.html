<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE3H Monastery Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-pale: #f5e8c0;
    --parchment: #fdf6e3;
    --ink: #1a1208;
    --ink-soft: #3d2e10;
    --ink-muted: #6b5533;
    --red: #8b1a1a;
    --red-soft: #c0392b;
    --blue-crest: #1a3a5c;
    --blue-light: #2e6da4;
    --green-crest: #1a4a2e;
    --border: #c9a84c44;
    --shadow: rgba(26,18,8,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0b06;
    background-image: 
      radial-gradient(ellipse at 20% 50%, #1a1208 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, #1a1208 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    font-family: 'Crimson Pro', serif;
    color: var(--ink);
  }

  /* HEADER */
  .site-header {
    background: linear-gradient(180deg, #0e0b06 0%, #1a1208 40%, #231805 100%);
    border-bottom: 1px solid var(--gold);
    padding: 24px 20px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(201,168,76,0.15);
  }

  .site-header h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 600;
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
  }

  .site-header p {
    color: var(--gold-pale);
    font-size: 0.82rem;
    opacity: 0.7;
    margin-top: 3px;
    font-style: italic;
  }

  .crest-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px auto 0;
    max-width: 300px;
    justify-content: center;
  }
  .crest-divider::before,
  .crest-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .crest-divider::after {
    background: linear-gradient(to left, transparent, var(--gold));
  }
  .crest-icon { color: var(--gold); font-size: 0.8rem; }

  /* TAB NAV */
  .tab-nav {
    display: flex;
    gap: 0;
    background: #14100a;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    background: none;
    border: none;
    padding: 12px 16px;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .tab-btn:hover { color: var(--gold-light); }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
    background: rgba(201,168,76,0.06);
  }

  /* MAIN CONTENT */
  .main-content {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }

  /* SECTION HEADERS */
  .section-title {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    margin: 20px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--gold), transparent);
    opacity: 0.4;
  }

  /* MONTH SELECTOR */
  .month-picker {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 16px;
  }
  .month-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    background: #1a1208;
    border: 1px solid var(--border);
    color: var(--ink-muted);
    padding: 8px 4px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .month-btn:hover { border-color: var(--gold); color: var(--gold-pale); }
  .month-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* LOST ITEMS TABLE */
  .items-panel {
    background: #1a1208;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .item-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    padding: 10px 12px;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: rgba(201,168,76,0.05); }
  .item-row.collected { opacity: 0.4; }
  .item-row.collected .item-name { text-decoration: line-through; }

  .item-col-header {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    opacity: 0.7;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(201,168,76,0.08);
  }
  .item-col-header-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }

  .item-name {
    font-size: 0.82rem;
    color: var(--parchment);
    line-height: 1.3;
  }
  .item-location {
    font-size: 0.75rem;
    color: var(--ink-muted);
    font-style: italic;
    line-height: 1.3;
  }
  .item-owner {
    font-size: 0.8rem;
    color: var(--gold-pale);
    text-align: right;
  }
  .check-icon {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 1px solid var(--gold);
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .item-row.collected .check-icon {
    background: var(--gold);
    border-color: var(--gold);
  }
  .item-row.collected .check-icon::after {
    content: '✓';
    color: var(--ink);
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-weight: bold;
  }

  /* TEA TIME */
  .char-search {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .char-search input {
    flex: 1;
    background: #1a1208;
    border: 1px solid var(--border);
    color: var(--parchment);
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    padding: 8px 12px;
    border-radius: 4px;
    outline: none;
  }
  .char-search input:focus { border-color: var(--gold); }
  .char-search input::placeholder { color: var(--ink-muted); font-style: italic; }

  .house-filters {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .house-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: #1a1208;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .house-btn[data-house="all"].active,
  .house-btn[data-house="all"]:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
  .house-btn[data-house="blue"].active,
  .house-btn[data-house="blue"]:hover { border-color: #4a90d9; color: #4a90d9; background: rgba(74,144,217,0.08); }
  .house-btn[data-house="black"].active,
  .house-btn[data-house="black"]:hover { border-color: #c0392b; color: #c0392b; background: rgba(192,57,43,0.08); }
  .house-btn[data-house="golden"].active,
  .house-btn[data-house="golden"]:hover { border-color: #d4a017; color: #d4a017; background: rgba(212,160,23,0.08); }
  .house-btn[data-house="church"].active,
  .house-btn[data-house="church"]:hover { border-color: #8b6fd4; color: #8b6fd4; background: rgba(139,111,212,0.08); }
  .house-btn[data-house="wolves"].active,
  .house-btn[data-house="wolves"]:hover { border-color: #5a9a6a; color: #5a9a6a; background: rgba(90,154,106,0.08); }

  .char-card {
    background: #1a1208;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .char-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .char-card-header:hover { background: rgba(201,168,76,0.05); }
  .char-name {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-pale);
    letter-spacing: 0.05em;
  }
  .char-house-badge {
    font-size: 0.62rem;
    font-family: 'Cinzel', serif;
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid;
    margin-left: 8px;
    letter-spacing: 0.05em;
  }
  .badge-blue { color: #4a90d9; border-color: #4a90d940; background: #4a90d910; }
  .badge-black { color: #c0392b; border-color: #c0392b40; background: #c0392b10; }
  .badge-golden { color: #d4a017; border-color: #d4a01740; background: #d4a01710; }
  .badge-church { color: #8b6fd4; border-color: #8b6fd440; background: #8b6fd410; }
  .badge-wolves { color: #5a9a6a; border-color: #5a9a6a40; background: #5a9a6a10; }

  .char-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tea-fav {
    font-size: 0.72rem;
    color: var(--ink-muted);
    font-style: italic;
  }
  .expand-arrow {
    color: var(--gold);
    font-size: 0.7rem;
    transition: transform 0.2s;
  }
  .char-card.open .expand-arrow { transform: rotate(180deg); }

  .char-card-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid rgba(201,168,76,0.1);
  }
  .char-card.open .char-card-body { display: block; }

  .tea-label {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    opacity: 0.8;
    margin: 10px 0 6px;
  }
  .tea-name {
    display: inline-block;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-pale);
    font-size: 0.78rem;
    padding: 3px 9px;
    border-radius: 3px;
    margin: 2px 3px 2px 0;
  }
  .topics-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .topic-chip {
    font-size: 0.72rem;
    color: var(--ink-muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 3px;
    padding: 2px 7px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .topic-chip:hover { border-color: var(--gold); color: var(--gold-pale); }
  .topic-chip.marked {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  .reactions-grid {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .reaction-row {
    font-size: 0.73rem;
    color: var(--parchment);
    background: rgba(201,168,76,0.04);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 3px;
    padding: 4px 8px;
    line-height: 1.4;
  }

  .bond-tracker {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(201,168,76,0.1);
  }
  .bond-label {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    color: var(--gold);
    letter-spacing: 0.08em;
  }
  .bond-dots {
    display: flex;
    gap: 5px;
  }
  .bond-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }
  .bond-dot.filled { background: var(--gold); }

  /* SUPPORT TRACKER */
  .support-table {
    background: #1a1208;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .support-row {
    display: flex;
    align-items: center;
    padding: 9px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .support-row:last-child { border-bottom: none; }
  .support-row:hover { background: rgba(201,168,76,0.04); }
  .support-char-name {
    flex: 1;
    font-size: 0.85rem;
    color: var(--parchment);
  }
  .support-level-btns {
    display: flex;
    gap: 4px;
  }
  .support-lvl {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    width: 26px;
    height: 26px;
    border-radius: 3px;
    border: 1px solid rgba(201,168,76,0.2);
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-weight: 600;
  }
  .support-lvl:hover { border-color: var(--gold); color: var(--gold); }
  .support-lvl.active-C { background: #2e3a20; border-color: #5a8a3a; color: #8abf5a; }
  .support-lvl.active-B { background: #1e2e4a; border-color: #3a6aaa; color: #6aaadf; }
  .support-lvl.active-A { background: #3a1e1e; border-color: #aa4a3a; color: #df8a7a; }
  .support-lvl.active-S { background: #3a2e10; border-color: #aa8a3a; color: var(--gold); }

  /* NOTES */
  .notes-area {
    background: #1a1208;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }
  .notes-area textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--parchment);
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    line-height: 1.7;
    resize: none;
    outline: none;
    min-height: 160px;
  }
  .notes-area textarea::placeholder { color: var(--ink-muted); font-style: italic; }

  /* PROGRESS BAR */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: #1a1208;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
  }
  .progress-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(201,168,76,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold), var(--gold-light));
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-pct {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--gold);
    min-width: 32px;
    text-align: right;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-muted);
    font-style: italic;
    font-size: 0.88rem;
  }

  /* TABS */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2a1e0a;
    border: 1px solid var(--gold);
    color: var(--gold-pale);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 8px 20px;
    border-radius: 4px;
    transition: transform 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .reset-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    background: none;
    border: 1px solid rgba(201,168,76,0.15);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { color: var(--red-soft); border-color: var(--red-soft); }

  /* ROSTER */
  .roster-add-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    background: rgba(201,168,76,0.08);
    border: 1px dashed rgba(201,168,76,0.4);
    padding: 10px 28px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .roster-add-btn:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); }
  .roster-add-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .roster-card {
    background: #1a1208;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .roster-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .roster-card-header:hover { background: rgba(201,168,76,0.04); }
  .roster-slot-num {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--gold);
    opacity: 0.6;
    margin-right: 8px;
    min-width: 20px;
  }
  .roster-char-label {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-pale);
    flex: 1;
  }
  .roster-char-label.empty { color: var(--ink-muted); font-style: italic; }
  .roster-remove-btn {
    background: none;
    border: none;
    color: var(--ink-muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .roster-remove-btn:hover { color: var(--red-soft); }

  .roster-card-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid rgba(201,168,76,0.1);
  }
  .roster-card.open .roster-card-body { display: block; }
  .roster-expand { color: var(--gold); font-size: 0.7rem; transition: transform 0.2s; margin-left: 8px; }
  .roster-card.open .roster-expand { transform: rotate(180deg); }

  .roster-field-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    opacity: 0.8;
    margin: 10px 0 5px;
  }
  .roster-select, .roster-textarea {
    width: 100%;
    background: #0e0b06;
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--parchment);
    font-family: 'Crimson Pro', serif;
    font-size: 0.88rem;
    padding: 7px 10px;
    border-radius: 3px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .roster-select:focus, .roster-textarea:focus { border-color: var(--gold); }
  .roster-select option { background: #1a1208; color: var(--parchment); }
  .roster-textarea { resize: vertical; min-height: 60px; line-height: 1.6; }
  .roster-select-wrap {
    position: relative;
  }
  .roster-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 0.8rem;

const ALL_CHARS = TEA_DATA.map(c => c.name);

// ─── STATE ────────────────────────────────────────────────────────────────────

function loadState() {
  try { return JSON.parse(localStorage.getItem('fe3h_state') || '{}'); } 
  catch { return {}; }
}
function saveState(s) {
  localStorage.setItem('fe3h_state', JSON.stringify(s));
}

let state = loadState();
if (!state.collectedItems) state.collectedItems = {};
if (!state.supports) state.supports = {};
if (!state.bonds) state.bonds = {};
if (!state.markedTopics) state.markedTopics = {};
if (!state.notes) state.notes = '';
if (!state.currentMonth) state.currentMonth = MONTHS[0];

// ─── TABS ─────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ─── LOST ITEMS ───────────────────────────────────────────────────────────────

function renderMonthPicker() {
  const picker = document.getElementById('monthPicker');
  picker.innerHTML = '';
  MONTHS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (m === state.currentMonth ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => {
      state.currentMonth = m;
      saveState(state);
      renderMonthPicker();
      renderItems();
    };
    picker.appendChild(btn);
  });
}

function renderItems() {
  const container = document.getElementById('itemsContainer');
  const items = LOST_ITEMS[state.currentMonth] || [];
  
  const collected = items.filter((it, i) => state.collectedItems[state.currentMonth + '_' + i]).length;
  const pct = items.length ? Math.round(collected / items.length * 100) : 0;
  document.getElementById('itemsProgressBar').style.width = pct + '%';
  document.getElementById('itemsProgressPct').textContent = pct + '%';

  container.innerHTML = `
    <div class="items-panel">
      <div class="item-col-header-row">
        <div class="item-col-header">Item</div>
        <div class="item-col-header">Location</div>
        <div class="item-col-header" style="text-align:right">Owner</div>
      </div>
      ${items.map((it, i) => {
        const key = state.currentMonth + '_' + i;
        const done = !!state.collectedItems[key];
        return `<div class="item-row${done ? ' collected' : ''}" onclick="toggleItem('${key}')">
          <div class="item-name"><span class="check-icon"></span>${it.name}</div>
          <div class="item-location">${it.location}</div>
          <div class="item-owner">${it.owner}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function toggleItem(key) {
  state.collectedItems[key] = !state.collectedItems[key];
  saveState(state);
  renderItems();
}

// ─── TEA TIME ─────────────────────────────────────────────────────────────────

let currentHouseFilter = 'all';

function filterHouse(btn) {
  document.querySelectorAll('.house-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentHouseFilter = btn.dataset.house;
  renderTeaCards();
}

function filterTeaChars() { renderTeaCards(); }

function renderTeaCards() {
  const query = document.getElementById('teaSearch').value.toLowerCase();
  const container = document.getElementById('teaContainer');
  const filtered = TEA_DATA.filter(c => {
    const houseOk = currentHouseFilter === 'all' || c.house === currentHouseFilter;
    const nameOk = c.name.toLowerCase().includes(query);
    return houseOk && nameOk;
  });
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">No characters found.</div>';
    return;
  }
  container.innerHTML = filtered.map(c => buildTeaCard(c)).join('');
}

const HOUSE_LABELS = {blue:'Blue Lions',black:'Black Eagles',golden:'Golden Deer',church:'Church',wolves:'Ashen Wolves'};

function buildTeaCard(c) {
  const bondKey = 'bond_' + c.name;
  const bondLevel = state.bonds[bondKey] || 0;
  const dots = [0,1].map(i => `<div class="bond-dot${bondLevel > i ? ' filled' : ''}" onclick="event.stopPropagation();setBond('${c.name}',${i+1})"></div>`).join('');
  const topics = c.topics.map(t => {
    const tKey = `topic_${c.name}_${t}`;
    const marked = state.markedTopics[tKey];
    return `<span class="topic-chip${marked ? ' marked' : ''}" onclick="event.stopPropagation();toggleTopic('${c.name}','${t.replace(/'/g,"\\'")}');this.classList.toggle('marked')">${t}</span>`;
  }).join('');
  const teas = c.teas.map(t => `<span class="tea-name">${t}</span>`).join('');
  const reactions = c.reactions.length ? c.reactions.map(r => `<div class="reaction-row">⚜ ${r}</div>`).join('') : '<div style="color:var(--ink-muted);font-style:italic;font-size:0.75rem">No reactions documented yet.</div>';
  return `<div class="char-card" id="card_${c.name}">
    <div class="char-card-header" onclick="toggleCard('${c.name}')">
      <div style="display:flex;align-items:center">
        <span class="char-name">${c.name}</span>
        <span class="char-house-badge badge-${c.house}">${HOUSE_LABELS[c.house]}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="tea-fav">☕ ${c.teas[0]}</span>
        <span class="expand-arrow">▾</span>
      </div>
    </div>
    <div class="char-card-body">
      <div class="tea-label">FAVORITE TEA</div>
      ${teas}
      <div class="tea-label" style="margin-top:10px">CONVERSATION TOPICS</div>
      <div class="topics-grid">${topics}</div>
      <div class="tea-label" style="margin-top:10px">FINAL REACTIONS</div>
      <div class="reactions-grid">${reactions}</div>
      <div class="bond-tracker">
        <span class="bond-label">PERFECT TEA DONE</span>
        <div class="bond-dots">${dots}</div>
        <span style="font-size:0.7rem;color:var(--ink-muted);margin-left:4px">${bondLevel}/2</span>
      </div>
    </div>
  </div>`;
}

function toggleCard(name) {
  document.getElementById('card_' + name).classList.toggle('open');
}

function toggleTopic(charName, topic) {
  const k = `topic_${charName}_${topic}`;
  state.markedTopics[k] = !state.markedTopics[k];
  saveState(state);
}

function setBond(charName, val) {
  const k = 'bond_' + charName;
  state.bonds[k] = state.bonds[k] === val ? val - 1 : val;
  saveState(state);
  const card = document.getElementById('card_' + charName);
  const dots = card.querySelectorAll('.bond-dot');
  const level = state.bonds[k];
  dots.forEach((d, i) => d.classList.toggle('filled', i < level));
  card.querySelector('.bond-tracker span:last-child').textContent = level + '/2';
}

// ─── SUPPORTS ─────────────────────────────────────────────────────────────────

const SUPPORT_LEVELS = ['C','B','A','S'];

function renderSupports() {
  const table = document.getElementById('supportTable');
  table.innerHTML = ALL_CHARS.map(name => {
    const current = state.supports[name] || '';
    const btns = SUPPORT_LEVELS.map(lvl => 
      `<button class="support-lvl${current === lvl ? ' active-' + lvl : ''}" onclick="setSupport('${name}','${lvl}')">${lvl}</button>`
    ).join('');
    return `<div class="support-row">
      <span class="support-char-name">${name}</span>
      <div class="support-level-btns">${btns}</div>
    </div>`;
  }).join('');
}

function setSupport(name, lvl) {
  state.supports[name] = state.supports[name] === lvl ? '' : lvl;
  saveState(state);
  renderSupports();
}

// ─── NOTES ───────────────────────────────────────────────────────────────────

function saveNotes() {
  state.notes = document.getElementById('notesField').value;
  saveState(state);
}

// ─── RESET ───────────────────────────────────────────────────────────────────

function clearAllData() {
  if (!confirm('Reset ALL progress? This cannot be undone.')) return;
  localStorage.removeItem('fe3h_state');
  state = {collectedItems:{},supports:{},bonds:{},markedTopics:{},roster:[],notes:'',currentMonth:MONTHS[0]};
  init();
  showToast('Progress reset.');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

function init() {
  renderMonthPicker();
  renderItems();
  renderTeaCards();
  renderSupports();
  if (!state.roster) state.roster = [];
  renderRoster();
  document.getElementById('notesField').value = state.notes || '';
}

// ─── ROSTER ──────────────────────────────────────────────────────────────────

const CLASSES = {
  "Beginner & Intermediate": [
    "Myrmidon","Soldier","Fighter","Monk","Ruffian","Lord (Judith)","Pegasus Knight",
    "Lord","Mercenary","Thief","Armored Knight","Cavalier","Brigand","Archer",
    "Brawler","Mage","Dark Mage","Priest","Thief (Prologue)"
  ],
  "Advanced": [
    "Paladin","Pegasus Knight (enemy)","Wyvern Rider","Warrior","Sniper","Grappler",
    "Warlock","Dark Bishop","Bishop","Hero","Swordmaster","Assassin","Fortress Knight"
  ],
  "Master": [
    "Falcon Knight","Wyvern Lord","Mortal Savant","Great Knight","Bow Knight",
    "Dark Knight","Holy Knight","War Master","Gremory"
  ],
  "Unique & Special": [
    "Noble","Commoner","Barbarossa","Emperor","Agastya","Enlightened One","Dancer",
    "Great Lord","King of Liberation","Saint","Flame Emperor","Flame Emperor (duplicate)",
    "Archbishop","Armored Lord","High Lord","Wyvern Master","Death Knight (non-playable)",
    "Death Knight (playable)","Trickster","War Monk / War Cleric","Dark Flier","Valkyrie"
  ]
};

function buildClassOptions(selected) {
  let html = '<option value="">— Select Class —</option>';
  for (const [group, classes] of Object.entries(CLASSES)) {
    html += `<optgroup label="${group}">`;
    for (const cls of classes) {
      html += `<option value="${cls}"${selected===cls?' selected':''}>${cls}</option>`;
    }
    html += '</optgroup>';
  }
  return html;
}

function buildCharOptions(selected) {
  let html = '<option value="">— Select Character —</option>';
  // Byleth first, then alphabetical
  const chars = ['Byleth', ...ALL_CHARS.filter(c => c !== 'Byleth').sort()];
  for (const c of chars) {
    html += `<option value="${c}"${selected===c?' selected':''}>${c}</option>`;
  }
  return html;
}

function buildAdjutantOptions(selected) {
  let html = '<option value="">— None —</option>';
  const chars = ['Byleth', ...ALL_CHARS.filter(c => c !== 'Byleth').sort()];
  for (const c of chars) {
    html += `<option value="${c}"${selected===c?' selected':''}>${c}</option>`;
  }
  return html;
}

function renderRoster() {
  const slots = state.roster || [];
  const container = document.getElementById('rosterSlots');
  const addBtn = document.querySelector('.roster-add-btn');
  document.getElementById('rosterCount').textContent = `${slots.length}/12`;
  if (addBtn) addBtn.disabled = slots.length >= 12;

  container.innerHTML = slots.map((slot, i) => {
    const label = slot.char || `Unit ${i+1}`;
    const isOpen = slot.open || false;
    return `<div class="roster-card${isOpen?' open':''}" id="rslot_${i}">
      <div class="roster-card-header" onclick="toggleRosterCard(${i})">
        <span class="roster-slot-num">${i+1}.</span>
        <span class="roster-char-label${slot.char?'':' empty'}">${label}</span>
        ${slot.currentClass ? `<span style="font-size:0.7rem;color:var(--ink-muted);font-style:italic;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px">${slot.currentClass}</span>` : ''}
        <span class="roster-expand">▾</span>
        <button class="roster-remove-btn" onclick="event.stopPropagation();removeRosterSlot(${i})" title="Remove">✕</button>
      </div>
      <div class="roster-card-body">
        <div class="roster-field-label">CHARACTER</div>
        <div class="roster-select-wrap">
          <select class="roster-select" onchange="updateRosterField(${i},'char',this.value)">
            ${buildCharOptions(slot.char)}
          </select>
        </div>

        <div class="roster-two-col">
          <div>
            <div class="roster-field-label">CURRENT CLASS</div>
            <div class="roster-select-wrap">
              <select class="roster-select" onchange="updateRosterField(${i},'currentClass',this.value)">
                ${buildClassOptions(slot.currentClass)}
              </select>
            </div>
          </div>
          <div>
            <div class="roster-field-label">TARGET CLASS</div>
            <div class="roster-select-wrap">
              <select class="roster-select" onchange="updateRosterField(${i},'targetClass',this.value)">
                ${buildClassOptions(slot.targetClass)}
              </select>
            </div>
          </div>
        </div>

        <div class="roster-field-label">ADJUTANT</div>
        <div class="roster-select-wrap">
          <select class="roster-select" onchange="updateRosterField(${i},'adjutant',this.value)">
            ${buildAdjutantOptions(slot.adjutant)}
          </select>
        </div>

        <div class="roster-field-label">NOTES</div>
        <textarea class="roster-textarea" placeholder="Skills to learn, battalions to equip, notes…" oninput="updateRosterField(${i},'notes',this.value)">${slot.notes||''}</textarea>
      </div>
    </div>`;
  }).join('');
}

function addRosterSlot() {
  if (!state.roster) state.roster = [];
  if (state.roster.length >= 12) return;
  state.roster.push({char:'',currentClass:'',targetClass:'',adjutant:'',notes:'',open:true});
  saveState(state);
  renderRoster();
}

function removeRosterSlot(i) {
  state.roster.splice(i, 1);
  saveState(state);
  renderRoster();
}

function toggleRosterCard(i) {
  state.roster[i].open = !state.roster[i].open;
  saveState(state);
  renderRoster();
}

function updateRosterField(i, field, value) {
  state.roster[i][field] = value;
  saveState(state);
  // just update the header label without full re-render to avoid losing focus
  const card = document.getElementById('rslot_' + i);
  if (!card) return;
  const label = card.querySelector('.roster-char-label');
  if (label) {
    label.textContent = state.roster[i].char || `Unit ${i+1}`;
    label.classList.toggle('empty', !state.roster[i].char);
  }
  const classSpan = card.querySelector('.roster-card-header span[style]');
  // update count
  document.getElementById('rosterCount').textContent = `${state.roster.length}/12`;
}

init();
</script>
</body>
</html>
